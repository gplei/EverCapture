<div class="container">
    <p class="tab-title">Summary</p>
    <div>
        <div class="">
            <select id="selAssetType" required>
                <option value="">-- Select type --</option>
            </select>
            <select id="selSymbol" required>
                <option value="">-- Select symbol --</option>
            </select>
            <a class="inlineButton" id="yLink" target="_blank"></a>
            <input type="text" id="txtCurrPrice" placeholder="current price" />
            <button id="btnUsePrice">Use price</button>
            <input type="text" id="txtSplitRatio" placeholder="split ratio (1:2 or 10:1)" />
            <button id="btnSplit" onclick="split()">Split</button>
        </div>
        <div id="divAddSymbol">
            <form id="formAddSymbol">
                <input type="text" id="txtSymbol" placeholder="Symbol (e.g., AAPL)" required>
                <input type="text" id="txtCompanyNname" placeholder="Company Name" required>
                <button id="btnAddSymbol" type="submit">Add Symbol</button>
            </form>
        </div>
        <div id="divAddTrade" class="hidden">
            <form id="formAddTrade">
                <input type="date" id="tradeDate" required>
                <select id="selTradeType">
                    <option value="BUY">BUY</option>
                    <option value="SELL">SELL</option>
                </select>
                <input type="number" id="share" placeholder="share" step="100" required>
                <input type="number" id="price" placeholder="Price per Share" step="0.01" required>
                <input type="number" id="lot" placeholder="Lot to Sell" step="1" required>
                <select id="selAccount" required>
                    <option value="">-- Select Account --</option>
                </select>
                <button id="btnAddTrade" type="submit">Add a Trade</button>
            </form>
        </div>
        <span id="message"></span>
        <div id="index" class="lightLabel"></div>
        <button id="btnUpdPrices" type="submit">Update Prices</button>
        <div id="divStockSummary"></div>
    </div>
</div>

<button id="btnToggleTrade" type="submit">Trade</button>

    <!-- Form to Add Account -->

            <button type="submit">Add Account</button>
            <span id="accountMessage"></span>
