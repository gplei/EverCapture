<div class="container">
    <p class="tab-title">Summary</p>
    <select id="selManageType">
        <option>-- Manage Account/Symbol --</option>
    </select>
    <div id="divMgr" class="hidden container" style="background-color: rgb(209, 227, 227);">
        <div id="divAccountManager" class="hidden">
            <select id="selAccountMgr">
                <option value="">-- Select Account --</option>
            </select>
            <input type="text" id="txtAccountMgr" placeholder="Account name" />
            <input type="text" id="txtInstituteMgr" placeholder="Institue" />
            <button id="btnSaveAccount" type="button">Add / Update Account</button>
            <span id="accountMgrMessage" class="lightLabel"></span>
            <button id="btnAddBalance">Add Balance</button>
            <span id="balanceMsg" class="lightLabel">Use the Add Symbol section above to add/update symbols.</span>
            <div id="divAccountBalance"></div>
        </div>

        <div id="divSymbolMgr" class="hidden">
            <button id="btnAddSymbol">Add Symbol</button>
            <span class="lightLabel">Use the Add Symbol section above to add/update symbols.</span>
            <div id="divSymbol"></div>
        </div>
    </div>

    <div>
        <div class="">
            <select id="selAssetType" required>
                <option value="">-- Select type --</option>
            </select>
            <select id="selSymbol" required>
                <option value="">-- Select symbol --</option>
            </select>
            <a class="inlineButton" id="yLink" target="_blank"></a>
            <input type="text" id="txtCurrPrice" placeholder="current price" />
            <button id="btnUsePrice">Use price</button>
            <input type="text" id="txtSplitRatio" placeholder="split ratio (1:2 or 10:1)" />
            <button id="btnSplit" onclick="split()">Split</button>
            <button id="btnAddTrade" type="submit">Add a Trade</button>

        </div>
        <span id="message"></span>
        <div id="index" class="lightLabel"></div>
        <button id="btnUpdPrices" type="submit">Update Prices</button>
        <div id="divStockSummary"></div>
    </div>
</div>

<button id="btnToggleTrade" type="submit">Trade</button>

<div id="manageTrade" class="hidden container">
    <p class="tab-title">Manage Trade</p>

    <div class="form-row">
    </div>

    <!-- All trades -->
    <div id="allTrade" class="table-container"></div>

</div>
